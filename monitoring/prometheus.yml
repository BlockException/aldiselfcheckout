global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'orchestrator'
    static_configs:
      - targets: ['orchestrator:3000']

  - job_name: 'product-service'
    static_configs:
      - targets: ['product-service:8080']

  - job_name: 'cart-service'
    static_configs:
      - targets: ['cart-service:3001']

  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:8081']

  - job_name: 'inventory-service'
    static_configs:
      - targets: ['inventory-service:8082']

  - job_name: 'fraud-service'
    static_configs:
      - targets: ['fraud-service:8083']

  - job_name: 'discount-engine'
    static_configs:
      - targets: ['discount-engine:5000']

  - job_name: 'audit-service'
    static_configs:
      - targets: ['audit-service:8084']
