syntax = "proto3";

package aldi.product.v1;

option go_package = "github.com/aldi/product/v1";

message Product {
  string product_id = 1;
  string ean = 2;
  string name = 3;
  string description = 4;
  double base_price = 5;
  double tax_rate = 6;
  repeated string categories = 7;
  bool is_active = 8;
  int32 stock_quantity = 9;
}

message GetProductRequest {
  string product_id = 1;
}

message GetProductResponse {
  Product product = 1;
}

message GetProductByEanRequest {
  string ean = 1;
}

message GetProductByEanResponse {
  Product product = 1;
}

message CalculatePriceRequest {
  string product_id = 1;
  int32 quantity = 2;
  repeated string pricing_strategies = 3;
}

message CalculatePriceResponse {
  double price = 1;
}

service ProductService {
  rpc GetProduct(GetProductRequest) returns (GetProductResponse);
  rpc GetProductByEan(GetProductByEanRequest) returns (GetProductByEanResponse);
  rpc CalculatePrice(CalculatePriceRequest) returns (CalculatePriceResponse);
}
